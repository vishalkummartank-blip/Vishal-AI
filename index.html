<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Welcome to GitHub Training from Web</title>



    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>



</head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="css/style.css">
<body>



    <header>

        <h1>Welcome to GitHub Training from Web</h1>

        <p>Learn GitHub, DevOps, Cloud and Modern Technologies</p>

    </header>



    <div class="container">



        <h2 class="section-title">Available Training Programs</h2>



        <div id="training-list">

            <div class="loading">Loading training data...</div>

        </div>



    </div>



    <footer>

        © 2026 GitHub Training Portal

    </footer>



    <script>



        const supabaseUrl = "https://nkppscojbtwtofdljjai.supabase.co";



        const supabaseKey = "sb_publishable_0GbdJP0v7YxOd5i5aHnw4Q_A-dCqRid";



        const supabaseClient = supabase.createClient(

            supabaseUrl,

            supabaseKey

        );



        async function loadTrainingData() {



            const { data, error } = await supabaseClient

                .from('trainingdata')

                .select('*')

                .order('id', { ascending: true });



            const container = document.getElementById('training-list');



            if (error) {

                console.error(error);



                container.innerHTML = `

                    <div class="card">

                        <h3>Error Loading Data</h3>

                        <p>${error.message}</p>

                    </div>

                `;

                return;

            }



            container.innerHTML = '';



            data.forEach(item => {



                container.innerHTML += `

                    <div class="card">

                        <h3>${item.title}</h3>



                        <p>${item.desc || ''}</p>



                        <div class="tech">

                            ${item.tech || ''}

                        </div>



                        <br>



                        <a

                            class="btn"

                            href="${item.link}"

                            target="_blank"

                        >

                            Open Training

                        </a>

                    </div>

                `;

            });

        }



        loadTrainingData();



    </script>

<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>

<script type="module" src="firebase-auth.js"></script>

</body>

</html>
